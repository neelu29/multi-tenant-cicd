name: Multi-Tenant CI/CD Pipeline

on:
  push:
    branches:
      - main
      - user1
      - user2
      - user3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        run: |
          IMAGE=multi-tenant-cicd/webapp:${{ github.ref_name }}
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.35.1'

      - name: Configure Kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          NAMESPACE=${{ github.ref_name }}
          kubectl set image deployment/webapp webapp=multi-tenant-cicd/webapp:${{ github.ref_name }} -n $NAMESPACE
          kubectl rollout status deployment/webapp -n $NAMESPACE

      - name: Rollback on Failure
        if: failure()
        run: |
          NAMESPACE=${{ github.ref_name }}
          kubectl rollout undo deployment/webapp -n $NAMESPACE

      - name: Trigger Kafka Event
        if: success()
        run: |
          echo "Deployment successful for ${{ github.ref_name }}" |           kafkacat -b ${{ secrets.KAFKA_BROKER }} -t deployments
