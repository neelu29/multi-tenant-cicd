apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user2-hpa
  namespace: user2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user2-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

