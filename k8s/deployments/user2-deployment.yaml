apiVersion: apps/v1
kind: Deployment
metadata:
  name: user2-deployment
  namespace: user2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user2-app
  template:
    metadata:
      labels:
        app: user2-app
    spec:
      containers:
      - name: user2-container
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
